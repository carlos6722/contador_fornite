<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siguiente Temporada & Tienda de Fortnite</title>
    <meta name="description" content="Contador de Fortnite gratis online. Suma y resta puntos fácilmente para partidas de Fortnite.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Rowdies:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- SCRIPT PRINCIPAL DE ADSENSE  -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7210259628625982"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="background-container">
        <div class="overlay"></div>
    </div>

    <!-- Pestañas de Navegación -->
    <nav class="main-tabs">
        <button class="tab-button active" data-tab="season">Próxima Temporada</button>
        <button class="tab-button" data-tab="shop">Tienda Diaria</button>
    </nav>

    <!-- Wrapper para contener anuncios y contenido central -->
    <div class="page-wrapper">
        
        <!-- Anuncio Lateral Izquierdo -->
        <aside class="ad-sidebar left">
            <!-- Bloque AdSense Lateral (Reemplaza data-ad-slot por el ID de tu bloque específico) -->
            <ins class="adsbygoogle"
                 style="display:inline-block;width:160px;height:600px"
                 data-ad-client="ca-pub-0000000000000000"
                 data-ad-slot="1111111111"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </aside>

        <main class="content">
            <!-- TAB: TEMPORADA -->
            <section id="tab-season" class="tab-content active-tab">
                <div class="hero-text">
                    <h1 class="glitch" data-text="PRÓXIMA TEMPORADA">PRÓXIMA TEMPORADA</h1>
                    <p>Prepárate para la acción. La nueva temporada comienza el 5 de Junio de 2026.</p>
                </div>

                <div class="countdown-card" id="season-countdown-container">
                    <div class="time-box">
                        <div class="time-value" id="days">00</div>
                        <div class="time-label">DÍAS</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-box">
                        <div class="time-value" id="hours">00</div>
                        <div class="time-label">HORAS</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-box">
                        <div class="time-value" id="minutes">00</div>
                        <div class="time-label">MINUTOS</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-box">
                        <div class="time-value" id="seconds">00</div>
                        <div class="time-label">SEGUNDOS</div>
                    </div>
                </div>

                <div class="season-started hide" id="season-started-message">
                    <h2>¡LA TEMPORADA HA COMENZADO!</h2>
                    <button class="play-button">JUGAR AHORA</button>
                </div>

                <!-- Anuncio Inferior (Contador) -->
                <div class="ad-banner bottom-ad">
                    <!-- Bloque AdSense Horizontal (Reemplaza data-ad-slot por tu ID) -->
                    <ins class="adsbygoogle"
                         style="display:inline-block;width:728px;height:90px"
                         data-ad-client="ca-pub-0000000000000000"
                         data-ad-slot="2222222222"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </section>

            <!-- TAB: TIENDA -->
            <section id="tab-shop" class="tab-content">
                <div class="shop-header">
                    <h1 class="glitch" data-text="TIENDA ACTUAL">TIENDA ACTUAL</h1>
                    <div class="shop-timer-container">
                        <p>Se actualiza en: <span id="shop-countdown" class="pulse-timer">00:00:00</span></p>
                    </div>
                </div>

                <div id="shop-grid" class="shop-grid">
                    <!-- Se inyectarán los items de la tienda aquí mediante JS -->
                    <div class="loading-shop">
                        <div class="spinner"></div>
                        <p>Cargando cosméticos...</p>
                    </div>
                </div>

                <!-- Anuncio Inferior (Tienda) -->
                <div class="ad-banner bottom-ad">
                    <!-- Bloque AdSense Horizontal/Adaptable -->
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-0000000000000000"
                         data-ad-slot="3333333333"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </section>
        </main>

        <!-- Anuncio Lateral Derecho -->
        <aside class="ad-sidebar right">
            <!-- Bloque AdSense Lateral Derecho -->
            <ins class="adsbygoogle"
                 style="display:inline-block;width:160px;height:600px"
                 data-ad-client="ca-pub-0000000000000000"
                 data-ad-slot="4444444444"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
